# Apache Configuration for Insight MyRoom
# Should be placed in /etc/apache2/sites-available/ or included in your existing VirtualHost.

# Ensure these modules are enabled:
# sudo a2enmod proxy
# sudo a2enmod proxy_http
# sudo a2enmod proxy_wstunnel
# sudo a2enmod rewrite
# sudo a2enmod headers

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName app.minagu.work

    # ... Your existing SSL configuration ...
    # SSLEngine on
    # SSLCertificateFile ...

    # 1. Backend API (FastAPI)
    # Forward /insight-myroom/api/ to localhost:8000
    ProxyPass /insight-myroom/api/ http://127.0.0.1:8000/
    ProxyPassReverse /insight-myroom/api/ http://127.0.0.1:8000/

    # 2. Frontend (Streamlit)
    
    # Redirect /insight-myroom to /insight-myroom/ (trailing slash is required)
    RedirectMatch 301 ^/insight-myroom$ /insight-myroom/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /insight-myroom/(.*) ws://127.0.0.1:8501/insight-myroom/$1 [P,L]

    # Standard HTTP Proxy
    ProxyPass /insight-myroom/ http://127.0.0.1:8501/insight-myroom/
    ProxyPassReverse /insight-myroom/ http://127.0.0.1:8501/insight-myroom/

</VirtualHost>
</IfModule>
