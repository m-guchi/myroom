# Apache Configuration for MyRoom
# Dedicated subdomain: https://myroom.gucchii.com/

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName myroom.gucchii.com

    # SSLEngine on
    # SSLCertificateFile ...

    # Backend API (FastAPI)
    ProxyPass /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    # Frontend + static (served by FastAPI from frontend/out)
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

</VirtualHost>
</IfModule>
