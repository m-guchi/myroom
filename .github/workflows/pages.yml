name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: ./frontend
        env:
          GITHUB_PAGES: "true"
          # 疑似本番で API を使う場合は GitHub Variables に設定（例: https://staging.myroom.gucchii.com）
          NEXT_PUBLIC_API_BASE: ${{ vars.STAGING_API_BASE }}
          NEXT_PUBLIC_APP_PASSWORD: ${{ secrets.STAGING_APP_PASSWORD }}
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
