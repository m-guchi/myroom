name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          HEAD_SHA=$(git rev-parse HEAD)

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$TAG")
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "Tag ${TAG} already points to HEAD"
              exit 0
            fi
            echo "::error::Tag ${TAG} already exists on ${TAG_SHA}, but HEAD is ${HEAD_SHA}. Bump frontend/package.json version before merging."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  deploy:
    runs-on: ubuntu-latest
    needs: tag

    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ env.SSH_PRIVATE_KEY }}
          known_hosts: placeholder
          if_key_exists: replace

      - name: Add Known Hosts
        run: ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=no "${USERNAME}@${HOST}" "mkdir -p ${TARGET_DIR}"

          rsync -rlDvz \
            -e "ssh -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'frontend/.env' \
            --exclude 'frontend-react/node_modules' \
            --exclude 'frontend-react/.env' \
            ./ "${USERNAME}@${HOST}:${TARGET_DIR}/"

      - name: Restart Backend Service
        env:
          APP_PASSWORD: ${{ env.APP_PASSWORD }}
          LOGIN_WEBHOOK_URL: ${{ env.LOGIN_WEBHOOK_URL }}
          SENSOR_WEBHOOK_URL: ${{ env.SENSOR_WEBHOOK_URL }}
          VAPID_PRIVATE_KEY: ${{ env.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ env.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT: ${{ env.VAPID_SUBJECT }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_NAME: ${{ env.DB_NAME }}
        run: |
          b64() { printf '%s' "$1" | base64 -w 0; }
          APP_PASSWORD_B64=$(b64 "$APP_PASSWORD")
          LOGIN_WEBHOOK_URL_B64=$(b64 "$LOGIN_WEBHOOK_URL")
          SENSOR_WEBHOOK_URL_B64=$(b64 "$SENSOR_WEBHOOK_URL")
          VAPID_PRIVATE_KEY_B64=$(b64 "$VAPID_PRIVATE_KEY")
          VAPID_PUBLIC_KEY_B64=$(b64 "$VAPID_PUBLIC_KEY")
          VAPID_SUBJECT_B64=$(b64 "$VAPID_SUBJECT")
          DB_USER_B64=$(b64 "$DB_USER")
          DB_PASSWORD_B64=$(b64 "$DB_PASSWORD")
          DB_HOST_B64=$(b64 "$DB_HOST")
          DB_PORT_B64=$(b64 "$DB_PORT")
          DB_NAME_B64=$(b64 "$DB_NAME")
          DB_MOCK_B64=$(b64 "false")
          ssh -p "${SSH_PORT}" "${USERNAME}@${HOST}" << EOF
            set -e
            echo "Current directory: \$(pwd)"
            cd ${TARGET_DIR}
            echo "Working directory: \$(pwd)"

            sync_env_var() {
              key="\$1"
              value="\$(printf '%s' "\$2" | base64 -d)"
              touch .env
              if grep -q "^\${key}=" .env; then
                grep -v "^\${key}=" .env > .env.tmp && mv .env.tmp .env
              fi
              printf '%s=%s\n' "\$key" "\$value" >> .env
            }

            sync_env_var APP_PASSWORD '${APP_PASSWORD_B64}'
            sync_env_var LOGIN_WEBHOOK_URL '${LOGIN_WEBHOOK_URL_B64}'
            sync_env_var SENSOR_WEBHOOK_URL '${SENSOR_WEBHOOK_URL_B64}'
            sync_env_var VAPID_PRIVATE_KEY '${VAPID_PRIVATE_KEY_B64}'
            sync_env_var VAPID_PUBLIC_KEY '${VAPID_PUBLIC_KEY_B64}'
            sync_env_var VAPID_SUBJECT '${VAPID_SUBJECT_B64}'
            sync_env_var DB_USER '${DB_USER_B64}'
            sync_env_var DB_PASSWORD '${DB_PASSWORD_B64}'
            sync_env_var DB_HOST '${DB_HOST_B64}'
            sync_env_var DB_PORT '${DB_PORT_B64}'
            sync_env_var DB_NAME '${DB_NAME_B64}'
            sync_env_var DB_MOCK '${DB_MOCK_B64}'

            bash deployment/ensure_venv.sh

            echo "Ensuring pip is installed..."
            ./venv/bin/python3 -m ensurepip || true

            if ! ./venv/bin/python3 -m pip --version > /dev/null 2>&1; then
                echo "Downloading get-pip.py..."
                curl -sS https://bootstrap.pypa.io/get-pip.py | ./venv/bin/python3
            fi

            echo "Installing dependencies..."
            ./venv/bin/python3 -m pip install --upgrade pip
            ./venv/bin/python3 -m pip install -r requirements.txt

            if [ -f "migrate_db.py" ]; then
                echo "Running migrations..."
                ./venv/bin/python3 migrate_db.py
            fi

            echo "Managing PM2 process..."
            npx pm2 delete myroom-backend 2>/dev/null || true
            npx pm2 delete insight-backend 2>/dev/null || true
            npx pm2 start ecosystem.config.js
            npx pm2 save
          EOF

  release:
    runs-on: ubuntu-latest
    needs: [tag, deploy]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect prerelease
        id: meta
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          skip_if_release_exists: true

  notify:
    runs-on: ubuntu-latest
    needs: [tag, deploy]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine workflow status
        id: status
        run: |
          tag="${{ needs.tag.result }}"
          deploy="${{ needs.deploy.result }}"
          if [ "$tag" = "success" ] && [ "$deploy" = "success" ]; then
            result=success
          elif [ "$tag" = "cancelled" ] || [ "$deploy" = "cancelled" ]; then
            result=cancelled
          else
            result=failure
          fi
          echo "result=$result" >> "$GITHUB_OUTPUT"

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: Signaly に通知
        env:
          SIGNALY_WEBHOOK_URL: ${{ env.SIGNALY_WEBHOOK_URL }}
          NOTIFY_APP: MyRoom
          NOTIFY_KIND: デプロイ
          NOTIFY_STATUS: ${{ steps.status.outputs.result }}
          NOTIFY_JOB: deploy
        run: bash .github/scripts/signaly-notify.sh

  notify-release:
    runs-on: ubuntu-latest
    needs: [tag, deploy, release]
    if: always() && needs.release.result != 'skipped'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: Signaly に通知
        env:
          SIGNALY_WEBHOOK_URL: ${{ env.SIGNALY_WEBHOOK_URL }}
          NOTIFY_STATUS: ${{ needs.release.result }}
          NOTIFY_APP: MyRoom
          NOTIFY_KIND: リリース
          NOTIFY_VERSION: ${{ needs.tag.outputs.tag }}
          NOTIFY_JOB: release
        run: bash .github/scripts/signaly-notify.sh
