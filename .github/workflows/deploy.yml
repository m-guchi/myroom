name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_APP_PASSWORD: ${{ secrets.VITE_APP_PASSWORD }}
        run: |
          npm ci
          npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'
          if_key_exists: replace

      - name: Add Known Hosts
        run: ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          # Ensure target directory exists
          ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} "mkdir -p ${{ secrets.TARGET_DIR }}"

          # Sync files (using -rltDvz instead of -avz to avoid permission errors on owner/group)
          rsync -rlDvz \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'frontend/.env' \
            --exclude 'frontend-react/node_modules' \
            --exclude 'frontend-react/.env' \
            ./ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET_DIR }}/

      - name: Restart Backend Service
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e
            echo "Current directory: $(pwd)"
            cd ${{ secrets.TARGET_DIR }}
            echo "Working directory: $(pwd)"
            
            # Create venv if not exists
            if [ ! -d "venv" ]; then
              echo "Creating virtual environment..."
              python3 -m venv venv
            fi
            
            echo "Ensuring pip is installed..."
            # Try ensurepip (standard lib)
            ./venv/bin/python3 -m ensurepip || true
            
            # Fallback to get-pip.py if ensurepip failed or is disabled
            if ! ./venv/bin/python3 -m pip --version > /dev/null 2>&1; then
                echo "Downloading get-pip.py..."
                curl -sS https://bootstrap.pypa.io/get-pip.py | ./venv/bin/python3
            fi
            
            # Update Python dependencies using python -m pip
            echo "Installing dependencies..."
            ./venv/bin/python3 -m pip install --upgrade pip
            ./venv/bin/python3 -m pip install -r requirements.txt
            
            # Run migrations (ensure DB schema is up to date)
            if [ -f "migrate_db.py" ]; then
                echo "Running migrations..."
                ./venv/bin/python3 migrate_db.py
            fi
            
            # Restart service using PM2 (No sudo required)
            # Ensure PM2 is installed on the server: 'npm install -g pm2'
            echo "Managing PM2 process..."
            if npx pm2 list | grep -q "myroom-backend"; then
              npx pm2 restart myroom-backend
            elif npx pm2 list | grep -q "insight-backend"; then
              npx pm2 delete insight-backend || true
              npx pm2 start ecosystem.config.js
            else
              npx pm2 start ecosystem.config.js
            fi
          EOF
