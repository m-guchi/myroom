name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: ".github/deploy.env.tpl"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ env.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'
          if_key_exists: replace

      - name: Add Known Hosts
        run: ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          # Ensure target directory exists
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=no "${USERNAME}@${HOST}" "mkdir -p ${TARGET_DIR}"

          # Sync files (using -rltDvz instead of -avz to avoid permission errors on owner/group)
          rsync -rlDvz \
            -e "ssh -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'frontend/.env' \
            --exclude 'frontend-react/node_modules' \
            --exclude 'frontend-react/.env' \
            ./ "${USERNAME}@${HOST}:${TARGET_DIR}/"

      - name: Restart Backend Service
        env:
          APP_PASSWORD: ${{ env.APP_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_WEBHOOK_URL }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_NAME: ${{ env.DB_NAME }}
        run: |
          b64() { printf '%s' "$1" | base64 -w 0; }
          APP_PASSWORD_B64=$(b64 "$APP_PASSWORD")
          DISCORD_WEBHOOK_URL_B64=$(b64 "$DISCORD_WEBHOOK_URL")
          DB_USER_B64=$(b64 "$DB_USER")
          DB_PASSWORD_B64=$(b64 "$DB_PASSWORD")
          DB_HOST_B64=$(b64 "$DB_HOST")
          DB_PORT_B64=$(b64 "$DB_PORT")
          DB_NAME_B64=$(b64 "$DB_NAME")
          DB_MOCK_B64=$(b64 "false")
          ssh -p "${SSH_PORT}" "${USERNAME}@${HOST}" << EOF
            set -e
            echo "Current directory: \$(pwd)"
            cd ${TARGET_DIR}
            echo "Working directory: \$(pwd)"

            sync_env_var() {
              key="\$1"
              value="\$(printf '%s' "\$2" | base64 -d)"
              touch .env
              if grep -q "^\${key}=" .env; then
                grep -v "^\${key}=" .env > .env.tmp && mv .env.tmp .env
              fi
              printf '%s=%s\n' "\$key" "\$value" >> .env
            }

            sync_env_var APP_PASSWORD '${APP_PASSWORD_B64}'
            sync_env_var DISCORD_WEBHOOK_URL '${DISCORD_WEBHOOK_URL_B64}'
            sync_env_var DB_USER '${DB_USER_B64}'
            sync_env_var DB_PASSWORD '${DB_PASSWORD_B64}'
            sync_env_var DB_HOST '${DB_HOST_B64}'
            sync_env_var DB_PORT '${DB_PORT_B64}'
            sync_env_var DB_NAME '${DB_NAME_B64}'
            sync_env_var DB_MOCK '${DB_MOCK_B64}'
            
            # Create venv if not exists (Ubuntu may need python3-venv)
            bash deployment/ensure_venv.sh
            
            echo "Ensuring pip is installed..."
            # Try ensurepip (standard lib)
            ./venv/bin/python3 -m ensurepip || true
            
            # Fallback to get-pip.py if ensurepip failed or is disabled
            if ! ./venv/bin/python3 -m pip --version > /dev/null 2>&1; then
                echo "Downloading get-pip.py..."
                curl -sS https://bootstrap.pypa.io/get-pip.py | ./venv/bin/python3
            fi
            
            # Update Python dependencies using python -m pip
            echo "Installing dependencies..."
            ./venv/bin/python3 -m pip install --upgrade pip
            ./venv/bin/python3 -m pip install -r requirements.txt
            
            # Run migrations (ensure DB schema is up to date)
            if [ -f "migrate_db.py" ]; then
                echo "Running migrations..."
                ./venv/bin/python3 migrate_db.py
            fi
            
            # Restart service using PM2 (No sudo required)
            # Always start from TARGET_DIR: pm2 restart keeps the original cwd.
            echo "Managing PM2 process..."
            npx pm2 delete myroom-backend 2>/dev/null || true
            npx pm2 delete insight-backend 2>/dev/null || true
            npx pm2 start ecosystem.config.js
            npx pm2 save
          EOF

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_CI_WEBHOOK_URL }}
          NOTIFY_STATUS: ${{ job.status }}
          NOTIFY_WORKFLOW: Build and Deploy
          NOTIFY_JOB: deploy
        run: bash .github/scripts/discord-notify.sh
