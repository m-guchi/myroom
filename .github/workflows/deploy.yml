name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies and Build Frontend
        working-directory: ./frontend-react
        run: |
          npm ci
          npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'
          if_key_exists: replace

      - name: Add Known Hosts
        run: ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          # Ensure target directory exists
          ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} "mkdir -p ${{ secrets.TARGET_DIR }}"

          # Sync files
          rsync -avz \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'frontend-react/node_modules' \
            --exclude 'frontend-react/.env' \
            ./ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET_DIR }}/

      - name: Restart Backend Service
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e
            cd ${{ secrets.TARGET_DIR }}
            
            # Activate venv if exists
            if [ -d "venv" ]; then
              source venv/bin/activate
            fi
            
            # Update Python dependencies
            pip install -r requirements.txt
            
            # Run migrations (ensure DB schema is up to date)
            if [ -f "migrate_db.py" ]; then
                python migrate_db.py
            fi
            
            # Restart service using PM2 (No sudo required)
            # Ensure PM2 is installed on the server: 'npm install -g pm2'
            if npx pm2 list | grep -q "insight-backend"; then
              npx pm2 restart insight-backend
            else
              npx pm2 start ecosystem.config.js
            fi
            
            # Save PM2 process list to resurrect on reboot (optional, requires initial setup)
            # npx pm2 save
          EOF
